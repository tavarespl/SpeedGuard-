<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SpeedGuard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root { --bg:#0a0a0a; --panel:#111; --border:#1e1e1e; --safe:#00e676; --warn:#ff6d00; --danger:#ff1744; --muted:#444; --accent:#0091ea; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:#e0e0e0; font-family:'Barlow Condensed',sans-serif; height:100dvh; overflow:hidden; user-select:none; }

  /* PERMISSION */
  #perm { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:32px; text-align:center; z-index:200; }
  #perm.hide { display:none; }
  #perm .icon { font-size:52px; }
  #perm h1 { font-size:22px; font-weight:900; letter-spacing:2px; color:#fff; }
  #perm p { font-size:14px; color:var(--muted); line-height:1.5; max-width:270px; }

  /* APP */
  #app { height:100dvh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; }
  .logo { font-size:16px; font-weight:900; letter-spacing:2px; color:#fff; }
  .logo span { color:var(--danger); }
  .badge { font-family:'JetBrains Mono',monospace; font-size:9px; padding:3px 7px; border-radius:2px; background:var(--border); color:var(--muted); letter-spacing:1px; }
  .badge.on { background:#00e67618; color:var(--safe); border:1px solid #00e67633; }
  .badge.err { background:#ff174418; color:var(--danger); border:1px solid #ff174433; }

  /* MAIN ROW — speed left, timer right */
  .main-row { display:flex; gap:8px; padding:8px 10px 6px; flex-shrink:0; }
  .box { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 6px; }
  .box-label { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .box-val { font-family:'JetBrains Mono',monospace; font-size:46px; font-weight:700; line-height:1; color:#fff; transition:color 0.2s; }
  .box-val.d { color:var(--danger); }
  .box-val.w { color:var(--warn); }
  .box-unit { font-size:10px; color:var(--muted); letter-spacing:2px; margin-top:2px; }
  .box-hint { font-size:10px; color:var(--muted); margin-top:3px; font-family:'JetBrains Mono',monospace; }
  .box-hint.soon { color:var(--warn); }

  /* STATUS STRIP */
  .strip { margin:0 10px 6px; background:#ff174410; border:1px solid #ff174430; border-radius:3px; padding:5px 10px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; opacity:0; transition:opacity 0.3s; }
  .strip.on { opacity:1; }
  .strip-l { font-size:9px; font-weight:700; letter-spacing:2px; color:var(--danger); }
  .strip-over { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--danger); font-weight:700; }
  .strip-beep { font-size:9px; color:var(--muted); letter-spacing:1px; }
  .strip-beep.soon { color:var(--warn); }

  /* HISTORY */
  .hist-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0 10px; min-height:0; }
  .hist-title { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; padding:5px 0 5px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .hist-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:3px; padding:4px 0; }
  .hist-list::-webkit-scrollbar { width:2px; }
  .hist-list::-webkit-scrollbar-thumb { background:var(--border); }
  .hist-item { background:var(--panel); border-left:2px solid var(--danger); padding:5px 8px; display:flex; justify-content:space-between; align-items:center; border-radius:0 3px 3px 0; font-family:'JetBrains Mono',monospace; font-size:11px; }
  .hi-s { color:var(--danger); font-weight:700; font-size:13px; }
  .hi-t { color:var(--muted); font-size:9px; }
  .hi-d { color:var(--warn); }
  .hist-empty { text-align:center; padding:14px; color:var(--muted); font-size:11px; letter-spacing:1px; }

  /* BOTTOM */
  .botbar { display:flex; gap:6px; padding:7px 10px; background:var(--panel); border-top:1px solid var(--border); flex-shrink:0; }
  .btn { flex:1; padding:10px 0; border:none; border-radius:3px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:transform 0.1s; }
  .btn:active { transform:scale(0.96); }
  .btn-go { background:var(--accent); color:#fff; }
  .btn-stp { background:var(--border); color:#e0e0e0; }
  .btn-rst { background:var(--border); color:#e0e0e0; flex:0.5; font-size:11px; }
  .btn:disabled { opacity:0.35; }
</style>
</head>
<body>

<div id="perm">
  <div class="icon">📍</div>
  <h1>DOSTĘP DO GPS</h1>
  <p>Potrzebna lokalizacja do pomiaru prędkości.</p>
  <button class="btn btn-go" id="btn-gps" style="max-width:240px;width:100%;padding:12px" onclick="reqGPS()">ZEZWÓL NA GPS</button>
  <button class="btn btn-stp" style="max-width:240px;width:100%;padding:10px;font-size:11px;margin-top:2px" onclick="useDemo()">TRYB DEMO</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo">Speed<span>Guard</span></div>
    <div id="badge" class="badge">BRAK GPS</div>
  </div>

  <div class="main-row">
    <div class="box">
      <div class="box-label">Prędkość</div>
      <div id="spd" class="box-val">0</div>
      <div class="box-unit">KM/H</div>
      <div class="box-hint">próg 90</div>
    </div>
    <div class="box">
      <div class="box-label">Czas przekroczenia</div>
      <div id="timer" class="box-val">00:00</div>
      <div class="box-unit">MM:SS</div>
      <div id="bcd" class="box-hint">–</div>
    </div>
  </div>

  <div id="strip" class="strip">
    <div class="strip-l">⚠ PRZEKROCZENIE</div>
    <div id="s-over" class="strip-over">+0</div>
    <div id="s-beep" class="strip-beep">sygnał za 10s</div>
  </div>

  <div class="hist-wrap">
    <div class="hist-title">Historia przekroczeń</div>
    <div id="hist" class="hist-list"><div class="hist-empty">Brak przekroczeń</div></div>
  </div>

  <div class="botbar">
    <button id="bs" class="btn btn-go" onclick="startMon()">▶ START</button>
    <button id="bx" class="btn btn-stp" onclick="stopMon()" disabled>■ STOP</button>
    <button class="btn btn-rst" onclick="resetAll()">RESET</button>
  </div>
</div>

<script>
// ── AUDIO ──
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(t){
  try{
    const c=ac();
    if(t==='start'){
      [0,0.2].forEach(o=>{
        const os=c.createOscillator(),g=c.createGain();
        os.connect(g);g.connect(c.destination);
        os.type='square';os.frequency.value=1050;
        g.gain.setValueAtTime(0.45,c.currentTime+o);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+o+0.15);
        os.start(c.currentTime+o);os.stop(c.currentTime+o+0.15);
      });
    }else if(t==='tick'){
      const os=c.createOscillator(),g=c.createGain();
      os.connect(g);g.connect(c.destination);
      os.type='sine';os.frequency.value=880;
      g.gain.setValueAtTime(0.35,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.18);
      os.start(c.currentTime);os.stop(c.currentTime+0.18);
    }else if(t==='end'){
      const os=c.createOscillator(),g=c.createGain();
      os.connect(g);g.connect(c.destination);
      os.type='sine';
      os.frequency.setValueAtTime(660,c.currentTime);
      os.frequency.linearRampToValueAtTime(330,c.currentTime+0.4);
      g.gain.setValueAtTime(0.3,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
      os.start(c.currentTime);os.stop(c.currentTime+0.4);
    }
  }catch(e){}
}
let aReady=false;
function unlockA(){if(aReady)return;aReady=true;try{ac().resume();}catch(e){}}
document.addEventListener('touchstart',unlockA,{once:true});
document.addEventListener('click',unlockA,{once:true});

// ── STATE ──
const THR=90;
let watchId=null,monitoring=false,isDemo=false;
let vActive=false,vStart=null,vSecs=0;
let vInt=null,tInt=null,dInt=null;
const hist=[];
let wl=null;

// ── DOM ──
const permEl=document.getElementById('perm');
const badgeEl=document.getElementById('badge');
const spdEl=document.getElementById('spd');
const timerEl=document.getElementById('timer');
const bcdEl=document.getElementById('bcd');
const stripEl=document.getElementById('strip');
const sOverEl=document.getElementById('s-over');
const sBeepEl=document.getElementById('s-beep');
const histEl=document.getElementById('hist');
const btnS=document.getElementById('bs');
const btnX=document.getElementById('bx');

// ── GPS ──
function reqGPS(){
  if(!navigator.geolocation){alert('Brak GPS.');return;}
  const btn=document.getElementById('btn-gps');
  btn.textContent='ŁĄCZENIE...';btn.disabled=true;
  const fb=setTimeout(()=>{permEl.classList.add('hide');setBadge('on');},10000);
  navigator.geolocation.getCurrentPosition(
    ()=>{clearTimeout(fb);permEl.classList.add('hide');setBadge('on');},
    e=>{
      clearTimeout(fb);btn.textContent='ZEZWÓL NA GPS';btn.disabled=false;
      if(e.code===1)alert('Odmowa. Wejdź w Chrome → Ustawienia witryn → Lokalizacja i zezwól.');
      else{permEl.classList.add('hide');setBadge('on');}
    },
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}
function useDemo(){isDemo=true;permEl.classList.add('hide');setBadge('demo');}
function setBadge(s){
  badgeEl.className='badge'+(s==='on'||s==='demo'?' on':s==='err'?' err':'');
  badgeEl.textContent=s==='on'?'GPS OK':s==='demo'?'DEMO':'BRAK GPS';
}

// ── MONITORING ──
function startMon(){
  if(monitoring)return;
  monitoring=true;btnS.disabled=true;btnX.disabled=false;
  if(isDemo)runDemo();
  else{
    watchId=navigator.geolocation.watchPosition(
      p=>{const s=p.coords.speed!=null?p.coords.speed*3.6:0;updateSpd(Math.round(s));},
      e=>console.warn(e),
      {enableHighAccuracy:true,maximumAge:0,timeout:5000}
    );
  }
}
function stopMon(){
  monitoring=false;btnS.disabled=false;btnX.disabled=true;
  if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(dInt);
  if(vActive)endV();
  updateSpd(0);
}

// ── DEMO ──
let dT=0;
function runDemo(){
  dT=0;
  const prof=[[15,0,60],[20,60,95],[10,95,112],[15,112,80],[10,80,60],[12,60,105],[10,105,84],[10,84,0]];
  dInt=setInterval(()=>{
    dT++;
    let el=0,spd=0;
    for(const [d,f,t] of prof){
      if(dT<=el+d){spd=Math.round(f+(t-f)*((dT-el)/d));break;}
      el+=d;
    }
    if(dT>el)dT=0;
    spd=Math.max(0,spd+Math.round((Math.random()-0.5)*4));
    updateSpd(spd);
  },500);
}

// ── SPEED ──
function updateSpd(spd){
  spdEl.textContent=spd;
  spdEl.className='box-val'+(spd>THR?' d':spd>75?' w':'');
  if(spd>THR){
    if(!vActive)startV();
    sOverEl.textContent='+'+(spd-THR)+' km/h';
  } else {
    if(vActive)endV();
  }
}

function startV(){
  vActive=true;vStart=Date.now();vSecs=0;
  stripEl.classList.add('on');
  beep('start');
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
  reqWL();

  vInt=setInterval(()=>{
    const e=Math.floor((Date.now()-vStart)/1000);
    timerEl.textContent=fmt(e);
    timerEl.className='box-val d';
  },200);

  tInt=setInterval(()=>{
    if(!vActive)return;
    vSecs++;
    const cd=10-(vSecs%10);
    bcdEl.textContent='sygnał za '+cd+'s';
    bcdEl.className='box-hint'+(cd<=3?' soon':'');
    sBeepEl.textContent='sygnał za '+cd+'s';
    sBeepEl.className='strip-beep'+(cd<=3?' soon':'');
    if(vSecs%10===0){beep('tick');if(navigator.vibrate)navigator.vibrate(80);}
  },1000);
}

function endV(){
  if(!vActive)return;
  vActive=false;
  const elapsed=Math.floor((Date.now()-vStart)/1000);
  clearInterval(vInt);vInt=null;
  clearInterval(tInt);tInt=null;

  beep('end');
  stripEl.classList.remove('on');
  timerEl.textContent='00:00';timerEl.className='box-val';
  bcdEl.textContent='–';bcdEl.className='box-hint';

  hist.unshift({spd:spdEl.textContent,dur:elapsed,time:new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})});
  renderH();
}

function renderH(){
  if(!hist.length){histEl.innerHTML='<div class="hist-empty">Brak przekroczeń</div>';return;}
  histEl.innerHTML=hist.slice(0,15).map(h=>`
    <div class="hist-item">
      <div><div class="hi-s">${h.spd} km/h</div><div class="hi-t">${h.time}</div></div>
      <div class="hi-d">${fmt(h.dur)}</div>
    </div>`).join('');
}

function resetAll(){
  hist.length=0;
  timerEl.textContent='00:00';timerEl.className='box-val';
  bcdEl.textContent='–';
  renderH();
}

function fmt(s){return pad(Math.floor(s/60))+':'+pad(s%60);}
function pad(n){return String(n).padStart(2,'0');}

async function reqWL(){try{if('wakeLock'in navigator)wl=await navigator.wakeLock.request('screen');}catch(e){}}
document.addEventListener('visibilitychange',async()=>{if(wl&&document.visibilityState==='visible'&&vActive)await reqWL();});
</script>
</body>
</html>
